name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-dotnet:
    name: Build (${{ matrix.project_name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project_name: SharedContracts
            project_path: src/SharedContracts/SharedContracts.csproj
          - project_name: AuthService
            project_path: src/AuthService/AuthService.csproj
          - project_name: MenuService
            project_path: src/MenuService/MenuService.csproj
          - project_name: OrderService
            project_path: src/OrderService/OrderService.csproj
          - project_name: PaymentMockService
            project_path: src/PaymentMockService/PaymentMockService.csproj
          - project_name: NotificationService
            project_path: src/NotificationService/NotificationService.csproj
          - project_name: ApiGateway
            project_path: src/ApiGateway/ApiGateway.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ${{ matrix.project_path }}

      - name: Build
        run: dotnet build ${{ matrix.project_path }} --configuration Release --no-restore

  validate-compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose syntax
        run: docker compose config > /dev/null