services:
  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      TZ: Asia/Bangkok
    depends_on:
      - gateway
    networks:
      - app-network

  gateway:
    build: ./gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8000"
    environment:
      PORT: 8000
      SERVICE_A_URL: http://service-a:5000
      SERVICE_B_URL: http://service-b:5000
      TZ: Asia/Bangkok
    depends_on:
      - service-a
      - service-b
    networks:
      - app-network

  service-a:
    build: ./services/service-a
    ports:
      - "${SERVICE_A_PORT:-5001}:5000"
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://${VENUE_DB_USER:-venue}:${VENUE_DB_PASSWORD:-venue}@venue-db:5432/${VENUE_DB_NAME:-venue_db}
      TZ: Asia/Bangkok
    depends_on:
      venue-db:
        condition: service_healthy
    networks:
      - app-network

  service-b:
    build: ./services/service-b
    ports:
      - "${SERVICE_B_PORT:-5002}:5000"
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://${BOOKING_DB_USER:-booking}:${BOOKING_DB_PASSWORD:-booking}@booking-db:5432/${BOOKING_DB_NAME:-booking_db}
      SERVICE_A_URL: http://service-a:5000
      TZ: Asia/Bangkok
    depends_on:
      booking-db:
        condition: service_healthy
      service-a:
        condition: service_started
    networks:
      - app-network

  venue-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${VENUE_DB_NAME:-venue_db}
      POSTGRES_USER: ${VENUE_DB_USER:-venue}
      POSTGRES_PASSWORD: ${VENUE_DB_PASSWORD:-venue}
    volumes:
      - venue-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${VENUE_DB_USER:-venue} -d ${VENUE_DB_NAME:-venue_db}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-network

  booking-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${BOOKING_DB_NAME:-booking_db}
      POSTGRES_USER: ${BOOKING_DB_USER:-booking}
      POSTGRES_PASSWORD: ${BOOKING_DB_PASSWORD:-booking}
    volumes:
      - booking-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BOOKING_DB_USER:-booking} -d ${BOOKING_DB_NAME:-booking_db}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  venue-db-data:
  booking-db-data:
